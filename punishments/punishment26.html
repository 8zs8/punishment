<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>惩罚项目26 - 小黄鸭舞蹈模仿 | 趣味惩罚游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B6B',
                        secondary: '#4ECDC4',
                        accent: '#FFD166',
                        dark: '#292F36',
                        light: '#F7FFF7'
                    },
                    fontFamily: {
                        comic: ['"Comic Sans MS"', '"Bubblegum Sans"', 'cursive']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }
            .bg-gradient-custom {
                background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            }
        }
    </style>
</head>
<body class="bg-light font-comic text-dark min-h-screen">
    <header class="bg-gradient-custom text-white py-6 shadow-lg">
        <div class="container mx-auto px-4">
            <a href="../index.html" class="text-white hover:text-accent transition-colors inline-block">
                <span class="text-xl font-bold">← 返回主页</span>
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <section class="max-w-3xl mx-auto">
            <div class="bg-white rounded-xl shadow-xl p-8 mb-8">
                <div class="flex items-center justify-between mb-6">
                    <span class="bg-primary/20 text-primary font-bold text-xl py-2 px-6 rounded-full">惩罚项目 #26</span>
                    <span class="text-gray-500 text-sm">难度：★★☆☆☆</span>
                </div>
                
                <h2 class="text-[clamp(1.8rem,3vw,2.5rem)] font-bold text-primary mb-6 text-center">小黄鸭舞蹈模仿</h2>
                
                <div class="bg-accent/10 rounded-lg p-6 mb-6">
                    <p class="text-[clamp(1.2rem,2vw,1.5rem)] text-dark font-medium text-center leading-relaxed">
                        模仿小黄鸭可爱动作，跳一段15秒的萌趣舞蹈
                    </p>
                </div>
                
                <div class="bg-gray-100 rounded-lg p-6 text-center mb-8">
                    <img src="../images/f1a4becae9fb52ba013bda67c83355da.GIF" alt="小黄鸭舞蹈参考" class="mx-auto max-h-64 object-contain rounded-lg shadow-md">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="bg-primary/5 rounded-lg p-4">
                        <h3 class="font-bold text-primary mb-2">执行要求</h3>
                        <ul class="list-disc list-inside text-gray-700 space-y-1">
                            <li>模仿小黄鸭的动作</li>
                            <li>舞蹈时长不少于15秒，动作连贯且充满萌趣</li>
                            <li>配合“嘎嘎”的小黄鸭叫声，增强表演效果</li>
                            <li>表情可爱，贴合小黄鸭的呆萌特质</li>
                        </ul>
                    </div>
                    <div class="bg-secondary/5 rounded-lg p-4">
                        <h3 class="font-bold text-secondary mb-2">温馨提示</h3>
                        <ul class="list-disc list-inside text-gray-700 space-y-1">
                            <li>动作幅度夸张一点，更能突出小黄鸭的可爱</li>
                            <li>注意保持平衡，避免摔倒</li>
                            <li>叫声无需过大，清脆可爱即可</li>
                            <li>可加入更多动作，丰富表演</li>
                        </ul>
                    </div>
                </div>

                <div class="text-center">
                    <a href="../index.html" class="bg-primary hover:bg-primary/90 text-white font-bold py-3 px-8 rounded-lg transition-colors text-lg">
                        返回主页
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-dark text-white py-4 mt-8">
        <div class="container mx-auto px-4 text-center text-sm">
            <p>趣味惩罚游戏 &copy; 2024</p>
        </div>
    </footer>
</body>
</html>
