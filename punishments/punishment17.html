<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>惩罚项目17 - 夸老师夸同桌 | 趣味惩罚游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FF6B6B',
                        secondary: '#4ECDC4',
                        accent: '#FFD166',
                        dark: '#292F36',
                        light: '#F7FFF7'
                    },
                    fontFamily: {
                        comic: ['"Comic Sans MS"', '"Bubblegum Sans"', 'cursive']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow {
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            }
            .bg-gradient-custom {
                background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            }
        }
    </style>
</head>
<body class="bg-light font-comic text-dark min-h-screen">
    <header class="bg-gradient-custom text-white py-6 shadow-lg">
        <div class="container mx-auto px-4">
            <a href="../index.html" class="text-white hover:text-accent transition-colors inline-block">
                <span class="text-xl font-bold">← 返回主页</span>
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <section class="max-w-3xl mx-auto">
            <div class="bg-white rounded-xl shadow-xl p-8 mb-8">
                <div class="flex items-center justify-between mb-6">
                    <span class="bg-primary/20 text-primary font-bold text-xl py-2 px-6 rounded-full">惩罚项目 #17</span>
                    <span class="text-gray-500 text-sm">难度：★★☆☆☆</span>
                </div>
                
                <h2 class="text-[clamp(1.8rem,3vw,2.5rem)] font-bold text-primary mb-6 text-center">夸老师夸同桌</h2>
                
                <div class="bg-accent/10 rounded-lg p-6 mb-6">
                    <p class="text-[clamp(1.2rem,2vw,1.5rem)] text-dark font-medium text-center leading-relaxed">
                        说5句夸老师的话，5句夸同桌的话，不得重复
                    </p>
                </div>
                
                <div class="bg-gray-100 rounded-lg p-6 text-center mb-8">
                    <img src="../images/9029d6999b8c82bdf4e7f21d2796c206.GIF" alt="夸赞参考" class="mx-auto max-h-64 object-contain rounded-lg shadow-md">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="bg-primary/5 rounded-lg p-4">
                        <h3 class="font-bold text-primary mb-2">执行要求</h3>
                        <ul class="list-disc list-inside text-gray-700 space-y-1">
                            <li>依次说出5句夸赞老师的话，内容不重复</li>
                            <li>再说出5句夸赞同桌的话，内容不重复且与夸老师的话不雷同</li>
                            <li>夸赞内容真实贴切，不刻意浮夸</li>
                            <li>表达时语气真诚，吐字清晰</li>
                        </ul>
                    </div>
                    <div class="bg-secondary/5 rounded-lg p-4">
                        <h3 class="font-bold text-secondary mb-2">温馨提示</h3>
                        <ul class="list-disc list-inside text-gray-700 space-y-1">
                            <li>夸老师可从教学、性格、责任心等角度出发</li>
                            <li>夸同桌可从相处、性格、特长等角度出发</li>
                            <li>若一时想不出，可简单组织语言但确保不重复</li>
                            <li>全程保持微笑，让夸赞更有感染力</li>
                        </ul>
                    </div>
                </div>

                <div class="text-center">
                    <a href="../index.html" class="bg-primary hover:bg-primary/90 text-white font-bold py-3 px-8 rounded-lg transition-colors text-lg">
                        返回主页
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-dark text-white py-4 mt-8">
        <div class="container mx-auto px-4 text-center text-sm">
            <p>趣味惩罚游戏 &copy; 2024</p>
        </div>
    </footer>
</body>
</html>
